name: eigenflux-monitor

# Shared monitoring stack (Jaeger + Loki + Grafana).
# Not tied to any specific project — start once, use for all local dev projects.
#
# Usage:
#   docker compose -f docker-compose.monitor.yml up -d
#   docker compose -f docker-compose.monitor.yml down
#
# Then enable monitoring in your project .env:
#   MONITOR_ENABLED=true

services:
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4317}:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16686/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "${LOKI_PORT:-3122}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-config:/etc/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      prometheus-init:
        condition: service_completed_successfully

  # Generates prometheus.yml with METRICS_HOST replaced.
  # Local: defaults to host.docker.internal (services on host).
  # Cloud: set METRICS_HOST to the app server's internal IP.
  prometheus-init:
    image: busybox:1.37
    environment:
      - METRICS_HOST=${METRICS_HOST:-host.docker.internal}
    volumes:
      - ./configs/prometheus/prometheus.yml:/template/prometheus.yml:ro
      - prometheus-config:/etc/prometheus
    command: sh -c 'sed "s|METRICS_HOST|$$METRICS_HOST|g" /template/prometheus.yml > /etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      # Local dev binds 0.0.0.0:3123 (anonymous Admin, as before). In cloud set
      # GRAFANA_BIND=127.0.0.1 so the only public entry is Caddy/HTTPS.
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3123}:3000"
    environment:
      # Auth defaults preserve the local dev experience (anonymous Admin, no
      # login). In cloud override these in .env to require login.
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-}
      # PostgreSQL datasource connection (consumed by configs/grafana/datasources.yml).
      # The DB host is independent of METRICS_HOST (scrape target): defaults to the
      # local dev DB; in cloud set GRAFANA_PG_* in .env (e.g. the managed RDS endpoint
      # and a read-only role).
      - GRAFANA_PG_HOST=${GRAFANA_PG_HOST:-host.docker.internal}
      - GRAFANA_PG_PORT=${GRAFANA_PG_PORT:-5432}
      - GRAFANA_PG_USER=${GRAFANA_PG_USER:-eigenflux}
      - GRAFANA_PG_PASSWORD=${GRAFANA_PG_PASSWORD:-eigenflux123}
      - GRAFANA_PG_DATABASE=${GRAFANA_PG_DATABASE:-eigenflux}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist Grafana's internal DB (users, public-dashboard tokens, prefs).
      # Without this, recreating the container wipes anything created via API/UI.
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/ds.yml
      - ./configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Public HTTPS entrypoint for Grafana. Cloud only — gated behind the `public`
  # profile so it never starts in local dev. Start with:
  #   docker compose -f docker-compose.monitor.yml --profile public up -d
  # Requires DNS (GRAFANA_DOMAIN -> this host) and inbound 80/443 open.
  caddy:
    image: caddy:2.8
    profiles: ["public"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - GRAFANA_DOMAIN=${GRAFANA_DOMAIN:-grafana.eigenflux.ai}
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      grafana:
        condition: service_healthy

volumes:
  prometheus-config:
  grafana-data:
  caddy-data:
  caddy-config:
