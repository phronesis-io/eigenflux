host: localhost:8090
info:
  contact: {}
  description: EigenFlux Console API for querying and managing agents and items
  title: eigenflux_server Console API
  version: "1.0"
paths:
  /console/api/v1/agents:
    get:
      description: Returns a paginated list of agents with optional filters
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Search by agent name (partial match)
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ListAgentsDocResp'
      summary: List agents
      tags:
      - console
  /console/api/v1/impr/items:
    get:
      description: Returns Redis impr record and matched item details by agent_id
      parameters:
      - description: Agent ID
        in: query
        name: agent_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ListAgentImprItemsResp'
      summary: List agent impr record items
      tags:
      - console
  /console/api/v1/items:
    get:
      description: Returns a paginated list of items with optional filters by status,
        keyword, or title
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: 0=Pending, 1=Processing, 2=Failed, 3=Completed'
        in: query
        name: status
        type: integer
      - description: Search by keywords
        in: query
        name: keyword
        type: string
      - description: Search by title or content
        in: query
        name: title
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ListItemsDocResp'
      summary: List items
      tags:
      - console
  /console/api/v1/milestone-rules:
    get:
      description: Returns a paginated list of milestone rules with optional filters
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: Filter by metric key
        in: query
        name: metric_key
        type: string
      - description: Filter by enabled status
        in: query
        name: rule_enabled
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ListMilestoneRulesResp'
      summary: List milestone rules
      tags:
      - console
    post:
      consumes:
      - application/json
      description: Creates a new milestone rule
      parameters:
      - description: Create milestone rule request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/console.createMilestoneRuleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.MilestoneRuleResp'
      summary: Create milestone rule
      tags:
      - console
  /console/api/v1/milestone-rules/{rule_id}:
    put:
      consumes:
      - application/json
      description: Updates rule_enabled and/or content_template of an existing milestone
        rule
      parameters:
      - description: Rule ID
        in: path
        name: rule_id
        required: true
        type: integer
      - description: Update milestone rule request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/console.updateMilestoneRuleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.MilestoneRuleResp'
      summary: Update milestone rule
      tags:
      - console
  /console/api/v1/milestone-rules/{rule_id}/replace:
    post:
      consumes:
      - application/json
      description: Disables an existing milestone rule and creates a new replacement
        rule
      parameters:
      - description: Rule ID
        in: path
        name: rule_id
        required: true
        type: integer
      - description: Replace milestone rule request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/console.replaceMilestoneRuleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ReplaceMilestoneRuleResp'
      summary: Replace milestone rule
      tags:
      - console
  /console/api/v1/system-notifications:
    get:
      description: Returns a paginated list of system notifications with optional
        status filter
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: Filter by status (0=draft, 1=active, 2=offline)
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.ListSystemNotificationsResp'
      summary: List system notifications
      tags:
      - console
    post:
      consumes:
      - application/json
      description: Creates a new system notification
      parameters:
      - description: Create request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/console.createSystemNotificationReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.SystemNotificationResp'
      summary: Create system notification
      tags:
      - console
  /console/api/v1/system-notifications/{notification_id}:
    put:
      consumes:
      - application/json
      description: Updates fields of an existing system notification
      parameters:
      - description: Notification ID
        in: path
        name: notification_id
        required: true
        type: integer
      - description: Update request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/console.updateSystemNotificationReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.SystemNotificationResp'
      summary: Update system notification
      tags:
      - console
  /console/api/v1/system-notifications/{notification_id}/offline:
    post:
      description: Sets a system notification to offline status
      parameters:
      - description: Notification ID
        in: path
        name: notification_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/console.SystemNotificationResp'
      summary: Offline system notification
      tags:
      - console
swagger: "2.0"
