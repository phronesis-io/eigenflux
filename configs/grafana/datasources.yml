apiVersion: 1
datasources:
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    uid: jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    uid: loki
    jsonData:
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "\"traceId\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
  # Business/distribution queries (user growth, retention). Connection comes
  # from env injected into the grafana container (see docker-compose.monitor.yml).
  # For cloud, point GRAFANA_PG_* at a read-only role.
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: $GRAFANA_PG_HOST:$GRAFANA_PG_PORT
    user: $GRAFANA_PG_USER
    uid: postgres
    jsonData:
      database: $GRAFANA_PG_DATABASE
      sslmode: disable
      postgresVersionGE: "15"
    secureJsonData:
      password: $GRAFANA_PG_PASSWORD
