apiVersion: 1
datasources:
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    uid: jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    uid: loki
    jsonData:
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "\"traceId\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
  - name: PostgreSQL
    type: grafana-postgresql-datasource
    access: proxy
    url: ${GF_PG_HOST:-host.docker.internal}:${GF_PG_PORT:-5432}
    uid: postgres
    jsonData:
      database: ${GF_PG_DATABASE:-eigenflux_dev}
      sslmode: ${GF_PG_SSLMODE:-disable}
    secureJsonData:
      password: ${GF_PG_PASSWORD:-postgres}
    user: ${GF_PG_USER:-postgres}
